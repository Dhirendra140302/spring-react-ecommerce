services:
  - type: web
    name: smartcart-backend
    runtime: java
    rootDir: ecommerce_backend
    buildCommand: "./mvnw clean package -DskipTests --no-transfer-progress"
    startCommand: "java -Dserver.port=$PORT -jar target/ecommerce-0.0.1-SNAPSHOT.jar"
    healthCheckPath: /api/products
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartcart-db
          property: connectionString
      - key: DDL_AUTO
        value: create
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://ecommerce-iota-red-20.vercel.app
      - key: RAZORPAY_KEY_ID
        value: YOUR_RAZORPAY_KEY_ID
      - key: RAZORPAY_KEY_SECRET
        value: YOUR_RAZORPAY_KEY_SECRET
      - key: JAVA_OPTS
        value: "-Xmx400m -Xms200m"

databases:
  - name: smartcart-db
    databaseName: smartcart
    user: smartcart
    plan: free

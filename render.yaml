services:
  - type: web
    name: smartcart-backend
    runtime: docker
    dockerfilePath: ecommerce_backend/Dockerfile
    dockerContext: ecommerce_backend
    healthCheckPath: /api/products
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartcart-db
          property: connectionString
      - key: DDL_AUTO
        value: create
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://ecommerce-iota-red-20.vercel.app
      - key: RAZORPAY_KEY_ID
        value: YOUR_RAZORPAY_KEY_ID
      - key: RAZORPAY_KEY_SECRET
        value: YOUR_RAZORPAY_KEY_SECRET

databases:
  - name: smartcart-db
    databaseName: smartcart
    user: smartcart
    plan: free

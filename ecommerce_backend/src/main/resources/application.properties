spring.application.name=SmartCart

# ── Database ─────────────────────────────────────────────────────────────────
# Render injects DATABASE_URL as a full JDBC connection string for PostgreSQL.
# Falls back to local MySQL for development.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/smartcart?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}

# Driver auto-detected by Spring Boot from the URL — no need to set explicitly

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Let Hibernate auto-detect dialect from the connected DB (MySQL or PostgreSQL)
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:SmartCartSecretKey2024SmartCartSecretKey2024SmartCartSecretKey2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Razorpay ─────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:YOUR_RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:YOUR_RAZORPAY_KEY_SECRET}

# ── File upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${UPLOAD_DIR:uploads/}

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

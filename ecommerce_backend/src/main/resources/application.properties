spring.application.name=SmartCart

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartcart?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=SmartCartSecretKey2024SmartCartSecretKey2024SmartCartSecretKey2024
jwt.expiration=86400000

# Razorpay
razorpay.key.id=rzp_test_FAKE123456789
razorpay.key.secret=FAKEsecretKey123456789

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/

# Server
server.port=8080
